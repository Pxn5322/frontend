<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Smooth Dark Theme Rounded Background Canvas -->
  <rect width="32" height="32" rx="7" fill="#0F172A"/>
  
  <!-- Gradient Definition for the AI Nexus Node Paths -->
  <defs>
    <linearGradient id="nexusGradient" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/> <!-- Electric Indigo -->
      <stop offset="50%" stop-color="#3B82F6"/> <!-- Royal Blue -->
      <stop offset="100%" stop-color="#06B6D4"/> <!-- Neon Cyan -->
    </linearGradient>
  </defs>

  <!-- The Geometric Connected 'N' Path -->
  <path d="M8 8V24M8 8H12L20 24H24V8M20 24V8" stroke="url(#nexusGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small AI Core Node Dot -->
  <circle cx="22" cy="10" r="1.75" fill="#22C55E"/> <!-- Active Security Green Indicator -->
</svg>
